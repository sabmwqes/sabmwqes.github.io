<!DOCTYPE html>
<html lang="en">

<head>
    <title>sabmwqes</title>
    <link rel="icon" href="apple-touch-icon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta property="og:title" content="sabmwqes">
    <meta property="og:description" content="sabmwqes homepage">
    <meta property="og:url" content="https://sabmwqes.github.io">
    <meta property="og:image" content="https://sabmwqes.github.io/homepage-bg.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- External -->
    <link href="https://use.fontawesome.com/releases/v6.1.2/css/all.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200&display=swap" rel="stylesheet">

    <!-- Internal -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/coin.css">
    <script type="text/javascript" src="js/animation.js"></script>
    <script type="module" src="js/fractal.js"></script>
    <script type="module" src="js/icosahedron.js"></script>
    <script type="module" src="js/coinflip.js"></script>

</head>

<body>
    <canvas id="icosahedron"></canvas>
    <canvas id="fractal"></canvas>
    <main id="main">
        <a id="top"></a>
        <header class="name-logo">
            <div class="my-name">sabmwqes</div>
        </header>
        <h1 class="srcumble-text" data-value="LINKS">LINKS</h1>
        <div class="cards">
            <div class="card" id="twitter-card" onclick="this.querySelector('p').textContent='(Not coming soon)'">
                <i class="fa-brands fa-square-twitter fa-5x skyblue"></i>
                <p>Twitter</p>
            </div>
            <div class="card">
                <i class="fa-brands fa-square-github fa-5x"></i>
                <p>GitHub</p>
                <a href="https://github.com/sabmwqes" target="_blank"></a>
            </div>
            <div class="card">
                <i class="fa-brands fa-square-youtube fa-5x red"></i>
                <p>YouTube</p>
                <a href="https://www.youtube.com/channel/UCUh_uioze0QPehUM4RTgQFg" target="_blank"></a>
            </div>
            <div class="card">
                <i class="fa-solid fa-cube fa-4x green" style="margin-bottom: 10px"></i>
                <p>SkyBlock</p>
                <a href="https://sky.shiiyu.moe/stats/SABM4096/Tomato" target="_blank"></a>
            </div>
            <!-- <div class="card">
                <i class="fa-brands fa-square-steam fa-5x darkblue"></i>
                <p>Steam</p>
                <a href="" target="_blank"></a>
            </div>
            <div class="card">

            </div> -->
        </div>
        <h1 class="srcumble-text" data-value="PROJECTS">PROJECTS</h1>
        <div class="cards">
            <div class="card">
                <img src="browser-notepad.svg" alt="Browser-Notepad" width="57" height="57" class="notepad-color-cycle" style="margin-bottom: 10px">
                <p>Browser-Notepad</p>
                <a href="https://sabmwqes.github.io/browser-notepad/" target="_blank"></a>
            </div>
            <div class="card">
                <i class="fa-solid fa-arrows-rotate fa-4x lightblue" style="margin-bottom: 10px"></i>
                <p>mcConverter</p>
                <a href="https://sabmwqes.github.io/mc-converter/" target="_blank"></a>
            </div>
            <div class="card">
                <i class="fa-brands fa-css3-alt fa-4x darkblue" style="margin-bottom: 10px"></i>
                <p>CSSPlayground</p>
                <a href="https://sabmwqes.github.io/css-playground/" target="_blank"></a>
            </div>
            <div class="card">
                <i class="fa-brands fa-question fa-4x yellow" style="margin-bottom: 10px"></i>
                <p>Riddles</p>
                <a href="https://sabmwqes.github.io/riddle-polygon/" target="_blank"></a>
            </div>
            <div class="card">
                <img src="amatarix.svg" alt="Amatarix" width="57" height="57" style="margin-bottom: 10px">
                <p>Amatarix</p>
                <a href="https://sabmwqes.github.io/amatarix/" target="_blank"></a>
            </div>
            <div class="card">
                <img src="taskhroma.svg" alt="Taskhroma" width="57" height="57" style="margin-bottom: 10px">
                <p>Taskhroma</p>
                <a href="https://sabmwqes.github.io/taskhroma/" target="_blank"></a>
            </div>
            <!-- <div class="card">

            </div> -->
        </div>
        <h1 class="srcumble-text" data-value="RANDOM">RANDOM</h1>
        <div class="cards">
            <div class="card" id="coinflip">
                <div class="parent-coin">
                    <div class="coin coin-head">1</div>
                    <div class="coin coin-tail">0</div>
                </div>
                <p>Coin Flip</p>
            </div>
            <div class="card">
                <img src="https://sabmwqes.github.io/daily-fractal/daily.png" alt="Daily Fractal" width="64" height="64" class="fractal-thumb" style="margin-bottom: 10px; object-fit: cover; object-position: center top;">
                <p>Today's Fractal</p>
                <a href="https://sabmwqes.github.io/daily-fractal/" target="_blank"></a>
            </div>
            <div class="card" id="moai-trigger" onclick="document.body.classList.toggle('moai-mode'); this.querySelector('p').textContent = document.body.classList.contains('moai-mode') ? 'THE INVINCIBLE MOAI' : '???'">
                <span class="moai">🗿</span>
                <p class="moai-text">???</p>
            </div>
        </div>
        <footer>
            BACK TO TOP
            <a href="#top"></a>
        </footer>
    </main>
</body>

</html>
